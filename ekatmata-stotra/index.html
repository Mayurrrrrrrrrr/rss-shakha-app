<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>एकात्मता स्तोत्र | Ekatmata Stotra - भारत की एकता का मंत्र</title>
    <meta name="description" content="भारत की सांस्कृतिक और आध्यात्मिक एकता को दर्शाने वाला 'एकात्मता स्तोत्र' - चित्रों और विवरणों के साथ।">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Eczar:wght@400;600;700&family=Martel:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body class="bg-[#FFF9F2] text-[#2C3E50] min-h-screen font-['Martel'] manuscript-bg">

    <!-- Header Section -->
    <header class="py-16 px-4 text-center relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-1 bg-gradient-to-r from-transparent via-[#E67E22] to-transparent"></div>
        <h1 class="text-6xl md:text-8xl font-bold text-[#8E44AD] mb-4 font-['Eczar'] title-shimmer">एकात्मता स्तोत्र</h1>
        <p class="text-2xl text-[#7F8C8D] max-w-2xl mx-auto font-['Martel'] italic">भारत की सांस्कृतिक और आध्यात्मिक एकता का अनुपम सूत्र।</p>
        <div class="mt-8 flex justify-center items-center gap-6">
            <span class="h-0.5 w-24 bg-[#D4AF37] opacity-50"></span>
            <span class="text-[#D4AF37] text-4xl ornament">ॐ</span>
            <span class="h-0.5 w-24 bg-[#D4AF37] opacity-50"></span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 pb-32">
        <div class="max-w-4xl mx-auto manuscript-container p-8 md:p-20 relative">
            <div id="stotra-content" class="space-y-16 text-center text-2xl md:text-4xl leading-[1.8] font-['Martel']">
                <!-- Verses will be injected here by JS -->
                <div class="animate-pulse space-y-6">
                    <div class="h-10 bg-gray-200/50 rounded-full w-3/4 mx-auto"></div>
                    <div class="h-10 bg-gray-200/50 rounded-full w-1/2 mx-auto"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Entity Details Side Panel (Desktop) -->
    <aside id="side-panel" class="fixed top-0 right-0 h-full w-[450px] bg-[#FFF9F2] shadow-2xl z-50 transform translate-x-full transition-transform duration-500 border-l-4 border-[#D4AF37] overflow-y-auto hidden lg:block">
        <div class="relative min-h-full parchment-bg">
            <button id="close-side-panel" class="absolute top-6 right-6 z-10 w-10 h-10 flex items-center justify-center rounded-full bg-[#E67E22] text-white text-2xl hover:rotate-90 transition-all duration-300 shadow-lg">✕</button>
            <div id="side-panel-content" class="p-8">
                <!-- Content will be injected by script.js -->
            </div>
        </div>
    </aside>

    <!-- Entity Bottom Sheet (Mobile) -->
    <div id="bottom-sheet" class="fixed bottom-0 left-0 w-full bg-[#FFF9F2] shadow-[0_-20px_50px_rgba(0,0,0,0.3)] z-50 transform translate-y-full transition-transform duration-500 rounded-t-[40px] border-t-4 border-[#D4AF37] max-h-[90vh] overflow-y-auto lg:hidden">
        <div class="parchment-bg min-h-[300px]">
            <div class="w-16 h-1.5 bg-[#D4AF37]/30 rounded-full mx-auto my-6"></div>
            <div id="bottom-sheet-content" class="px-8 pb-12">
                <!-- Content will be injected by script.js -->
            </div>
        </div>
    </div>

    <!-- Backdrop -->
    <div id="backdrop" class="fixed inset-0 bg-[#2C3E50]/60 backdrop-blur-md z-40 hidden opacity-0 transition-opacity duration-500"></div>

    <!-- Footer -->
    <footer class="py-12 text-center text-[#7F8C8D] border-t border-[#D4AF37]/20 bg-black/5">
        <p class="font-['Martel'] text-lg">© 2024 एकात्मता स्तोत्र परियोजना। निष्ठा के साथ निर्मित।</p>
        <p class="mt-4 font-['Eczar'] text-3xl text-[#E67E22] font-bold tracking-widest">|| भारत माता की जय ||</p>
    </footer>

    <!-- Scripts -->
    <script src="script.js?v=4" charset="UTF-8"></script>
</body>
</html>
