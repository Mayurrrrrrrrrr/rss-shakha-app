<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>एकात्मता स्तोत्र | Ekatmata Stotra - भारत की एकता का मंत्र</title>
    <meta name="description" content="भारत की सांस्कृतिक और आध्यात्मिक एकता को दर्शाने वाला 'एकात्मता स्तोत्र' - चित्रों और विवरणों के साथ।">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Tippy.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css" />
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FFF9F2] text-[#2C3E50] min-h-screen font-['Poppins']">

    <!-- Header Section -->
    <header class="py-12 px-4 text-center relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-1 bg-gradient-to-r from-transparent via-[#E67E22] to-transparent"></div>
        <h1 class="text-5xl md:text-7xl font-bold text-[#E67E22] mb-4 font-['Mukta']">एकात्मता स्तोत्र</h1>
        <p class="text-xl text-[#7F8C8D] max-w-2xl mx-auto font-['Mukta']">भारत की सांस्कृतिक और आध्यात्मिक एकता का अनुपम सूत्र।</p>
        <div class="mt-8 flex justify-center gap-4">
            <span class="h-0.5 w-16 bg-[#D4AF37] self-center"></span>
            <span class="text-[#D4AF37] text-2xl">ॐ</span>
            <span class="h-0.5 w-16 bg-[#D4AF37] self-center"></span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 pb-24">
        <div class="max-w-4xl mx-auto bg-white/50 backdrop-blur-sm rounded-3xl p-6 md:p-16 shadow-2xl border border-[#D4AF37]/20 relative">
            <!-- Decorative Corners -->
            <div class="absolute top-4 left-4 w-12 h-12 border-t-2 border-l-2 border-[#D4AF37]/40 rounded-tl-xl hidden md:block"></div>
            <div class="absolute top-4 right-4 w-12 h-12 border-t-2 border-r-2 border-[#D4AF37]/40 rounded-tr-xl hidden md:block"></div>
            <div class="absolute bottom-4 left-4 w-12 h-12 border-b-2 border-l-2 border-[#D4AF37]/40 rounded-bl-xl hidden md:block"></div>
            <div class="absolute bottom-4 right-4 w-12 h-12 border-b-2 border-r-2 border-[#D4AF37]/40 rounded-br-xl hidden md:block"></div>

            <div id="stotra-content" class="space-y-12 text-center text-xl md:text-3xl leading-relaxed font-['Mukta']">
                <!-- Verses will be injected here by JS -->
                <div class="animate-pulse space-y-4">
                    <div class="h-8 bg-gray-200 rounded w-3/4 mx-auto"></div>
                    <div class="h-8 bg-gray-200 rounded w-1/2 mx-auto"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 text-center text-[#7F8C8D] text-sm border-t border-[#D4AF37]/10">
        <p class="font-['Mukta']">© 2024 एकात्मता स्तोत्र परियोजना। निष्ठा के साथ निर्मित।</p>
        <p class="mt-2 font-['Mukta'] text-lg text-[#E67E22] font-bold">|| भारत माता की जय ||</p>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <script src="script.js" charset="UTF-8"></script>
</body>
</html>
